<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNC // ENGINE TEST 02</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #5dade2; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; text-shadow: 0 0 5px #000; }
        .gold { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>ENGINE_TEST_02</h2>
        <p>STATUS: <span style="color: #2ecc71;">GALAXY_SYNC</span></p>
    </div>
    
    <script>
        // --- 1. SCENE SETUP (Mobile Optimized) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 40; 
        
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 1.2);
        light.position.set(20, 20, 20);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x444444));

        // --- 2. THE CORE (35 lightweight shards) ---
        const planetGroup = new THREE.Group();
        const shardGeo = new THREE.IcosahedronGeometry(1.2, 0);
        const shardMat = new THREE.MeshPhongMaterial({ color: 0x3498db, flatShading: true });
        
        for(let i=0; i<35; i++) {
            const s = new THREE.Mesh(shardGeo, shardMat);
            const d = 10 + Math.random() * 8;
            s.position.set((Math.random()-0.5)*d, (Math.random()-0.5)*d, (Math.random()-0.5)*d);
            planetGroup.add(s);
        }
        scene.add(planetGroup);

        // --- 3. THE CRESCENT MOON (Mobile-Safe Group) ---
        const moonGroup = new THREE.Group();
        
        const moonGeo = new THREE.SphereGeometry(3.5, 24, 24);
        const moonMat = new THREE.MeshPhongMaterial({ color: 0xffffaa, emissive: 0x222211 });
        const moon = new THREE.Mesh(moonGeo, moonMat);
        moonGroup.add(moon);

        // The locked shadow that creates the perfect Crescent shape
        const shadowGeo = new THREE.SphereGeometry(3.6, 24, 24);
        const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000 }); 
        const moonShadow = new THREE.Mesh(shadowGeo, shadowMat);
        moonShadow.position.set(2.5, 0, 1); 
        moonGroup.add(moonShadow);

        // Pulled closer to the center so narrow phone screens don't cut it off
        moonGroup.position.set(10, 14, -10); 
        scene.add(moonGroup);

        // --- 4. THE GALAXY (Ultra-Lightweight Point Cloud) ---
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<150; i++) {
            starPos.push((Math.random()-0.5)*150, (Math.random()-0.5)*150, (Math.random()-0.5)*150);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        
        // Rendered as tiny dots instead of heavy 3D spheres
        const starPoints = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.3 }));
        scene.add(starPoints);

        // --- 5. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            planetGroup.rotation.y += 0.003;
            planetGroup.rotation.x += 0.001;
            starPoints.rotation.y += 0.0005; // This makes the Galaxy spin
            renderer.render(scene, camera);
        }
        animate();

        // Handle screen rotation safely
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
