<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNC // RECONSTRUCTION_V2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #5dade2; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        #ui { position: relative; z-index: 100; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; pointer-events: none; }
        #log, #footer, .gold { pointer-events: auto; text-shadow: 0 0 10px #000; }
        .gold { color: #f1c40f; font-weight: bold; }
        .pulse { animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div id="ui">
        <div id="log">
            <h1 class="pulse">TERRA_CLASSIC // FULL_MAP</h1>
            <p>CORE_INTEGRITY: <span id="percent" class="gold">FETCHING...</span></p>
            <p>ACTIVE_NODES: <span style="color: #2ecc71;">200 (SIMULATED)</span></p>
        </div>
        <div id="footer">
            <p style="font-size: 10px;">ID: LUNC-RECO-01 | [SIGNAL_SYNCED]</p>
            <p>RESERVE: <span id="res" class="gold">99.50 LUNC</span></p>
        </div>
    </div>

    <script>
        let wallet = "terra18pddm2phs4mtxxjwpxccqzm4f465zchx7um32"; //
        let repairFactor = 0.25; // Default to 25% to keep planet visible

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 50; 
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0x444444));

        // --- 1. THE CORE (PLANET) ---
        const planetGroup = new THREE.Group();
        const shards = [];
        const shardGeo = new THREE.IcosahedronGeometry(1.2, 0);
        const shardMat = new THREE.MeshPhongMaterial({ color: 0x3498db, flatShading: true, transparent: true, opacity: 0.8 });
        for(let i=0; i<70; i++) {
            const s = new THREE.Mesh(shardGeo, shardMat);
            const d = 15 + Math.random() * 12;
            s.position.set((Math.random()-0.5)*d, (Math.random()-0.5)*d, (Math.random()-0.5)*d);
            s.userData.origin = s.position.clone();
            planetGroup.add(s);
            shards.push(s);
        }
        scene.add(planetGroup);

        // --- 2. THE STARS (OTHER WALLETS) ---
        const starGroup = new THREE.Group();
        const starGeo = new THREE.SphereGeometry(0.15, 8, 8);
        const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        for (let i = 0; i < 150; i++) {
            const star = new THREE.Mesh(starGeo, starMat);
            const dist = 60 + Math.random() * 40;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            star.position.set(dist * Math.sin(phi) * Math.cos(theta), dist * Math.sin(phi) * Math.sin(theta), dist * Math.cos(phi));
            starGroup.add(star);
        }
        scene.add(starGroup);

        // --- 3. THE TRANSFER BEAMS ---
        const lineMat = new THREE.LineBasicMaterial({ color: 0x5dade2, transparent: true, opacity: 0.3 });
        for(let i=0; i<5; i++) {
            const points = [new THREE.Vector3(0,0,0), starGroup.children[i].position];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(lineGeo, lineMat);
            scene.add(line);
        }

        // --- DATA SYNC ---
        async function updateData() {
            try {
                const r = await fetch(`https://terra-classic-lcd.publicnode.com/cosmos/bank/v1beta1/balances/${wallet}`);
                const d = await r.json();
                const b = d.balances.find(x => x.denom === 'uluna');
                const val = b ? parseFloat(b.amount) / 1000000 : 99.5;

                document.getElementById('res').innerText = val.toFixed(2) + " LUNC";
                repairFactor = Math.max(0.25, Math.min(val / 1000, 1));
                document.getElementById('percent').innerText = Math.round(repairFactor * 100) + '%';
            } catch (e) {
                document.getElementById('res').innerText = "99.50 LUNC (cached)";
                document.getElementById('percent').innerText = "25%";
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            planetGroup.rotation.y += 0.003;
            starGroup.rotation.y += 0.0005; // Stars rotate as the galaxy
            
            shards.forEach(s => {
                s.position.lerpVectors(s.userData.origin, new THREE.Vector3(0,0,0), repairFactor);
            });
            renderer.render(scene, camera);
        }

        updateData();
        animate();
    </script>
</body>
</html>
