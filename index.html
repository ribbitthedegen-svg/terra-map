<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Classic: Reconstruction Satellite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #5dade2; }
        
        /* Layering: 3D Engine in back, UI in front */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        #ui-layer { 
            position: relative; 
            z-index: 100 !important; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 20px;
            pointer-events: none; /* Allows clicking through to 3D if needed */
        }
        
        #satellite-log, #footer, .search-container, h1 { pointer-events: auto; }
        
        .integrity-bar { color: #f1c40f; font-weight: bold; }
        #moon-status { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        
        .search-container { margin-top: 10px; }
        input { background: rgba(0,0,0,0.7); border: 1px solid #5dade2; color: #fff; padding: 8px; width: 220px; }
        button { background: #3498db; border: none; color: #fff; padding: 8px 15px; cursor: pointer; }
        
        /* Pulse effect for the reconstruction */
        .pulse { animation: scan 2s infinite; }
        @keyframes scan { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="satellite-log">
            <h1 class="pulse">TERRA_CLASSIC // RECONSTRUCTION</h1>
            <p>CORE_INTEGRITY: <span id="integrity-percent" class="integrity-bar">0%</span></p>
            <p>STATUS: <span style="color: #2ecc71;">ONLINE</span></p>
        </div>

        <div id="footer">
            <div class="search-container">
                <input type="text" id="wallet-input" placeholder="ENTER terra1... ADDRESS">
                <button onclick="updateWallet()">LOCATE_STAR</button>
            </div>
            <p style="margin-top: 20px;">[SIGNAL_LOG_09.03.2026]</p>
            <p>SATELLITE_ID: LUNC-RECO-01</p>
            <p>RESERVE_LEVEL: <span id="moon-status">CONNECTING...</span></p>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        let walletAddress = "terra18pddm2phs4mtxxjwpxccqzm4f465zchx7um32"; 
        
        // --- THREE.JS ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 45; 

        // Renderer with alpha for layering support
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const sun = new THREE.PointLight(0xffffff, 1.2);
        sun.position.set(20, 20, 20);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x333333));

        // --- THE SHATTERED CORE ---
        const planetGroup = new THREE.Group();
        const shards = [];
        const shardGeom = new THREE.IcosahedronGeometry(1.2, 0);
        const shardMat = new THREE.MeshPhongMaterial({ color: 0x3498db, flatShading: true, transparent: true, opacity: 0.8 });

        for(let i=0; i<80; i++) {
            const shard = new THREE.Mesh(shardGeom, shardMat);
            const dist = 18 + Math.random() * 12;
            shard.position.set(
                (Math.random() - 0.5) * dist,
                (Math.random() - 0.5) * dist,
                (Math.random() - 0.5) * dist
            );
            shard.userData.origin = shard.position.clone();
            shard.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
            planetGroup.add(shard);
            shards.push(shard);
        }
        scene.add(planetGroup);

        // --- DATA INTEGRATION ---
        let repairFactor = 0;

        async function updateData() {
            try {
                const resp = await fetch(`https://terra-classic-lcd.publicnode.com/cosmos/bank/v1beta1/balances/${walletAddress}`);
                const data = await resp.json();
                const balanceObj = data.balances.find(b => b.denom === 'uluna');
                const balance = balanceObj ? parseFloat(balanceObj.amount) / 1000000 : 0;

                // Update UI balance
                document.getElementById('moon-status').innerText = balance.toLocaleString(undefined, {minimumFractionDigits: 2}) + " LUNC";
                
                // Visual repair logic (Goal set to 1,000 LUNC for noticeable movement)
                repairFactor = Math.min(balance / 1000, 1);
                
                // Keep shards visible even at 0%
                const displayIntegrity = balance > 0 ? Math.max(repairFactor, 0.1) : 0;
                document.getElementById('integrity-percent').innerText = Math.round(displayIntegrity * 100) + '%';
                
            } catch (e) {
                console.error("Signal Lost");
                document.getElementById('moon-status').innerText = "SIGNAL_LOST";
            }
        }

        function updateWallet() {
            const input = document.getElementById('wallet-input').value;
            if(input.startsWith('terra1')) {
                walletAddress = input;
                updateData();
            }
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Spin the planet shards
            planetGroup.rotation.y += 0.002;
            planetGroup.rotation.x += 0.001;
            
            // Move shards toward center based on treasury health
            shards.forEach(s => {
                s.position.lerpVectors(s.userData.origin, new THREE.Vector3(0,0,0), repairFactor);
                s.rotation.x += 0.01;
            });

            renderer.render(scene, camera);
        }

        // INITIALIZE
        updateData();
        animate();
        setInterval(updateData, 30000); // Auto-refresh every 30 seconds

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
