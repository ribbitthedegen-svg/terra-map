<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNC // ENGINE TEST</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #5dade2; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; text-shadow: 0 0 5px #000; }
        .gold { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>ENGINE_TEST_01</h2>
        <p>STATUS: <span style="color: #2ecc71;">RENDER_ONLY</span></p>
    </div>
    
    <script>
        // --- 1. SCENE SETUP (Ultra-Lightweight) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 40; 
        
        // Antialias is FALSE to prevent mobile memory crashes
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Simple lighting
        const light = new THREE.PointLight(0xffffff, 1.2);
        light.position.set(20, 20, 20);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x444444));

        // --- 2. THE CORE (Reduced to 35 shards) ---
        const planetGroup = new THREE.Group();
        const shardGeo = new THREE.IcosahedronGeometry(1.2, 0);
        const shardMat = new THREE.MeshPhongMaterial({ color: 0x3498db, flatShading: true });
        
        for(let i=0; i<35; i++) {
            const s = new THREE.Mesh(shardGeo, shardMat);
            const d = 10 + Math.random() * 8;
            s.position.set((Math.random()-0.5)*d, (Math.random()-0.5)*d, (Math.random()-0.5)*d);
            planetGroup.add(s);
        }
        scene.add(planetGroup);

        // --- 3. THE CRESCENT MOON (Zero-Math Shadow Trick) ---
        const moonGeo = new THREE.SphereGeometry(4, 24, 24);
        const moonMat = new THREE.MeshPhongMaterial({ color: 0xffffaa, emissive: 0x222211 });
        const moon = new THREE.Mesh(moonGeo, moonMat);
        moon.position.set(18, 15, -10);
        scene.add(moon);

        // The "Shadow" is just a slightly larger black sphere hiding part of the yellow one
        const shadowGeo = new THREE.SphereGeometry(4.1, 24, 24);
        const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000 }); // Pure black, ignores light
        const moonShadow = new THREE.Mesh(shadowGeo, shadowMat);
        moonShadow.position.set(21, 15, -9); 
        scene.add(moonShadow);

        // --- 4. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            planetGroup.rotation.y += 0.003;
            planetGroup.rotation.x += 0.001;
            renderer.render(scene, camera);
        }
        animate();

        // Handle screen rotation/resizing safely
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
