        const planetGroup = new THREE.Group();
        const shards = [];
        const shardGeo = new THREE.IcosahedronGeometry(1.2, 0);
        const shardMat = new THREE.MeshPhongMaterial({ color: 0x3498db, flatShading: true, transparent: true, opacity: 0.8 });
        for(let i=0; i<80; i++) {
            const s = new THREE.Mesh(shardGeo, shardMat);
            const d = 15 + Math.random() * 10;
            s.position.set((Math.random()-0.5)*d, (Math.random()-0.5)*d, (Math.random()-0.5)*d);
            s.userData.origin = s.position.clone();
            planetGroup.add(s);
            shards.push(s);
        }
        scene.add(planetGroup);

        // --- 2. THE MOON (PHASE-SHIFTING TREASURY) ---
        const moonGeo = new THREE.SphereGeometry(6, 32, 32);
        const moonMat = new THREE.MeshPhongMaterial({ color: 0xffffaa, emissive: 0x222211 });

        moon.position.set(35, 20, -10);
        scene.add(moon);

        // SHADOW MESH FOR PHASES

        const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const moonShadow = new THREE.Mesh(shadowGeo, shadowMat);
        moonShadow.position.set(39, 20, -9); 
        scene.add(moonShadow);

        const starGroup = new THREE.Group();

        const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        for (let i = 0; i < 200; i++) {
            const star = new THREE.Mesh(starGeo, starMat);
            const dist = 80 + Math.random() * 50;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            star.position.set(dist * Math.sin(phi) * Math.cos(theta), dist * Math.sin(phi) * Math.sin(theta), dist * Math.cos(phi));
            starGroup.add(star);
        }
        scene.add(starGroup);

        // --- LIGHTING ---
        const sunLight = new THREE.PointLight(0xffffff, 2);
        sunLight.position.set(20, 20, 20);
        scene.add(sunLight);

                    }
                }

                document.getElementById('percent').innerText = Math.round(repairFactor * 100) + '%';
            } catch (e) {
                console.log("Maintaining orbit...");
            }
        }
