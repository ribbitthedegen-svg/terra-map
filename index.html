<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Classic: Reconstruction Satellite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* Base Layer */
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #5dade2; }
        
        /* 3D Engine Layer (Z=1) */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        /* Dashboard Layer (Z=100) */
        #ui-layer { 
            position: absolute; 
            inset: 0;
            z-index: 100 !important; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 20px;
            pointer-events: none;
        }
        
        #satellite-log, #footer, .search-container, h1, .integrity-bar { pointer-events: auto; text-shadow: 0 0 5px #000; }
        
        .integrity-bar { color: #f1c40f; font-weight: bold; }
        #moon-status { color: #f1c40f; font-weight: bold; }
        
        .search-container { margin-top: 10px; display: flex; gap: 5px; }
        input { background: rgba(0,0,0,0.8); border: 1px solid #5dade2; color: #fff; padding: 10px; width: 60%; font-size: 12px; }
        button { background: #3498db; border: none; color: #fff; padding: 10px; cursor: pointer; font-weight: bold; }
        
        .pulse { animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="satellite-log">
            <h1 class="pulse">TERRA_CLASSIC // RECONSTRUCTION</h1>
            <p>CORE_INTEGRITY: <span id="integrity-percent" class="integrity-bar">0%</span></p>
            <p>STATUS: <span style="color: #2ecc71;">ONLINE</span></p>
        </div>

        <div id="footer">
            <div class="search-container">
                <input type="text" id="wallet-input" placeholder="terra1... ADDRESS">
                <button onclick="updateWallet()">LOCATE</button>
            </div>
            <p style="margin-top: 15px; font-size: 10px;">[SIGNAL_LOG_09.03.2026] SATELLITE_ID: LUNC-RECO-01</p>
            <p>RESERVE_LEVEL: <span id="moon-status">SYNCING...</span></p>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        let walletAddress = "terra18pddm2phs4mtxxjwpxccqzm4f465zchx7um32"; // Your verified address
        
        // --- THREE.JS ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 40; 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const sun = new THREE.PointLight(0xffffff, 1.5);
        sun.position.set(10, 10, 20);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x444444));

        // --- THE SHATTERED CORE ---
        const planetGroup = new THREE.Group();
        const shards = [];
        const shardGeom = new THREE.IcosahedronGeometry(1, 0);
        const shardMat = new THREE.MeshPhongMaterial({ color: 0x3498db, flatShading: true, transparent: true, opacity: 0.8 });

        for(let i=0; i<60; i++) {
            const shard = new THREE.Mesh(shardGeom, shardMat);
            const dist = 15 + Math.random() * 10;
            shard.position.set((Math.random()-0.5)*dist, (Math.random()-0.5)*dist, (Math.random()-0.5)*dist);
            shard.userData.origin = shard.position.clone();
            planetGroup.add(shard);
            shards.push(shard);
        }
        scene.add(planetGroup);

        // --- DATA INTEGRATION ---
        let repairFactor = 0;
        
        async function updateData() {
            // Verified address from your successful sync
            const wallet = "terra18pddm2phs4mtxxjwpxccqzm4f465zchx7um32"; 
    
            try {
                // Boosted signal using an alternative public endpoint
                const resp = await fetch(`https://terra-classic-lcd.publicnode.com/cosmos/bank/v1beta1/balances/${wallet}`);
                const data = await resp.json();
        
                const balanceObj = data.balances.find(b => b.denom === 'uluna');
                const balance = balanceObj ? parseFloat(balanceObj.amount) / 1000000 : 0;

                // Restore the 99.5 LUNC display
                document.getElementById('moon-status').innerText = balance.toLocaleString() + " LUNC";
                document.getElementById('moon-status').style.color = "#f1c40f"; // Gold for success
        
                // Repair the planet based on the balance
                repairFactor = Math.min(balance / 1000, 1);
                document.getElementById('integrity-percent').innerText = Math.round(repairFactor * 100) + '%';
        
            } catch (e) {
                // If the signal is lost, keep the last known integrity visible
                document.getElementById('moon-status').innerText = "RE-SYNCING...";
            }
        }

        function updateWallet() {
            const val = document.getElementById('wallet-input').value;
            if(val.startsWith('terra1')) { walletAddress = val; updateData(); }
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            planetGroup.rotation.y += 0.003; // Rotate planet shards
            
            shards.forEach(s => {
                s.position.lerpVectors(s.userData.origin, new THREE.Vector3(0,0,0), repairFactor);
            });

            renderer.render(scene, camera); // Ignition command
        }

        updateData();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
