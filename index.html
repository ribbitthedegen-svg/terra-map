<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNC // RECONSTRUCTION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #5dade2; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        #ui { position: relative; z-index: 100; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; pointer-events: none; }
        #log, #footer, .search, h1 { pointer-events: auto; text-shadow: 0 0 10px #000; }
        .gold { color: #f1c40f; font-weight: bold; }
        .search { display: flex; gap: 5px; margin-top: 10px; }
        input { background: rgba(0,0,0,0.8); border: 1px solid #5dade2; color: #fff; padding: 12px; width: 60%; }
        button { background: #3498db; border: none; color: #fff; padding: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="log">
            <h1>TERRA_CLASSIC // RECO</h1>
            <p>CORE_INTEGRITY: <span id="percent" class="gold">0%</span></p>
            <p>STATUS: <span style="color: #2ecc71;">ONLINE</span></p>
        </div>

        <div id="footer">
            <div class="search">
                <input type="text" id="w-in" placeholder="terra1...">
                <button onclick="updateWallet()">LOCATE</button>
            </div>
            <p style="margin-top: 20px; font-size: 10px;">ID: LUNC-RECO-01 | [SIGNAL_SYNCED]</p>
            <p>RESERVE: <span id="res" class="gold">FETCHING...</span></p>
        </div>
    </div>

    <script>
        let wallet = "terra18pddm2phs4mtxxjwpxccqzm4f465zchx7um32"; // Your verified address
        let repairFactor = 0;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 40; 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x444444));
        const light = new THREE.PointLight(0xffffff, 1.5);
        light.position.set(20, 20, 20);
        scene.add(light);

        const planetGroup = new THREE.Group();
        const shards = [];
        const geo = new THREE.IcosahedronGeometry(1.2, 0);
        const mat = new THREE.MeshPhongMaterial({ color: 0x3498db, flatShading: true, transparent: true, opacity: 0.8 });

        for(let i=0; i<70; i++) {
            const s = new THREE.Mesh(geo, mat);
            const d = 15 + Math.random() * 12;
            s.position.set((Math.random()-0.5)*d, (Math.random()-0.5)*d, (Math.random()-0.5)*d);
            s.userData.origin = s.position.clone();
            planetGroup.add(s);
            shards.push(s);
        }
        scene.add(planetGroup);

        async function updateData() {
            try {
                // Using a fallback-ready fetch for mobile
                const r = await fetch(`https://terra-classic-lcd.publicnode.com/cosmos/bank/v1beta1/balances/${wallet}`);
                const d = await r.json();
                const b = d.balances.find(x => x.denom === 'uluna');
                const val = b ? parseFloat(b.amount) / 1000000 : 0;

                document.getElementById('res').innerText = val.toLocaleString() + " LUNC";
                
                // Visual repair: Planet forms if balance > 0
                repairFactor = val > 0 ? Math.min(val / 1000, 1) : 0;
                
                // Force visual integrity above 20% if there is any LUNC
                const display = val > 0 ? Math.max(repairFactor, 0.25) : 0;
                document.getElementById('percent').innerText = Math.round(display * 100) + '%';
            } catch (e) {
                document.getElementById('res').innerText = "SYNC_RETRY...";
            }
        }

        function updateWallet() {
            const v = document.getElementById('w-in').value;
            if(v.startsWith('terra1')) { wallet = v; updateData(); }
        }

        function animate() {
            requestAnimationFrame(animate);
            planetGroup.rotation.y += 0.003;
            shards.forEach(s => {
                s.position.lerpVectors(s.userData.origin, new THREE.Vector3(0,0,0), repairFactor);
            });
            renderer.render(scene, camera);
        }

        updateData();
        animate();
        setInterval(updateData, 20000); // 20-second pulse
    </script>
</body>
</html>
