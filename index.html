<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Classic: Reconstruction Satellite</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #5dade2; }
        
        /* Terminal Boot Screen */
        #boot-screen { position: fixed; inset: 0; background: #000; padding: 40px; z-index: 1000; transition: opacity 1s; overflow: hidden; }
        #terminal-content { white-space: pre-wrap; line-height: 1.6; font-size: 14px; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #5dade2; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* UI Overlay */
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; text-shadow: 0 0 5px #000; }
        #footer { position: absolute; bottom: 10px; right: 20px; font-size: 10px; opacity: 0.5; text-align: right; }

        /* Satellite Capture Button */
        .satellite-btn { 
            position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); 
            border: 1px solid rgba(81, 173, 226, 0.5); border-radius: 12px; 
            cursor: pointer; z-index: 100; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .satellite-btn:hover { background: rgba(81, 173, 226, 0.2); box-shadow: 0 0 15px #5dade2; }
        .satellite-btn svg { fill: #5dade2; width: 24px; }

        /* Search Bar */
        .search-container { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 90; }
        input { background: rgba(0,0,0,0.7); border: 1px solid #3498db; color: white; padding: 12px; border-radius: 5px; width: 280px; outline: none; }
        button#locate { background: #3498db; border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="boot-screen"><div id="terminal-content"></div></div>

    <div id="ui">
        <h2 style="margin:0; letter-spacing: 2px;">TERRA_CLASSIC // RECONSTRUCTION</h2>
        <div style="font-size: 12px; margin-top: 5px;">CORE_INTEGRITY: <span id="percent">0</span>%</div>
    </div>

    <button class="satellite-btn" onclick="takeSnapshot()" title="CAPTURE_SIGNAL">
        <svg viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm8 13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0-8c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3z"/></svg>
    </button>

    <div class="search-container">
        <input type="text" id="walletInput" placeholder="ENTER terra1... ADDRESS">
        <button id="locate" onclick="findWallet()">LOCATE_STAR</button>
    </div>

    <div id="satellite-log" style="position: absolute; bottom: 80px; right: 20px; text-align: right; font-size: 9px; color: #21618c; line-height: 1.4; pointer-events: auto; opacity: 0.7;">
        [SIGNAL_LOG_09.03.2026]<br>
        LUNAR_PHASE_SYNCED_TO: <span style="color: #5dade2; cursor: help;" title="Copy to Clipboard" onclick="navigator.clipboard.writeText('terra1...YOUR_WALLET')">terra1...[CLICK_TO_VIEW]</span><br>
        <span style="font-style: italic;">"The moon waxes as the reserve strengthens."</span>
    </div>
  
    <div id="footer">
        SATELLITE_ID: LUNC-RECO-01<br>
        RESERVE_LEVEL: <span id="moon-status">0.00</span> LUNC
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CONFIGURATION ---
        const YOUR_WALLET = "terra1jpddm2phs4mtxxjwepxccqzm4f465zchx7um32"; // <-- REPLACE THIS WITH YOUR WALLET

        // --- BOOT SEQUENCE ---
        const bootLines = [
            "> INITIALIZING SATELLITE LINK...",
            "> SYNCING COLUMBUS-5 MAINNET...",
            "> SCANNING SHATTERED SECTORS...",
            "> MAPPING WALLET CONSTELLATIONS...",
            "> TREASURY MOON DETECTED...",
            "> SYSTEM ONLINE. WELCOME COMMANDER."
        ];
        const term = document.getElementById('terminal-content');
        let idx = 0;
        function type() {
            if(idx < bootLines.length) {
                term.innerHTML += bootLines[idx] + "<br>";
                idx++; setTimeout(type, 500);
            } else {
                setTimeout(() => document.getElementById('boot-screen').style.opacity = '0', 1000);
                setTimeout(() => document.getElementById('boot-screen').remove(), 2000);
            }
        }
        type();

        // --- THREE.JS ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- THE SHATTERED CORE ---
        const planetGroup = new THREE.Group();
        const shards = [];
        for(let i=0; i<70; i++) {
            const shard = new THREE.Mesh(new THREE.TetrahedronGeometry(Math.random()*0.3+0.1), new THREE.MeshPhongMaterial({color: 0x3498db, flatShading: true}));
            shard.userData.origin = new THREE.Vector3((Math.random()-0.5)*12, (Math.random()-0.5)*12, (Math.random()-0.5)*12);
            shard.position.copy(shard.userData.origin);
            shards.push(shard); planetGroup.add(shard);
        }
        scene.add(planetGroup);

        // --- THE MOON ---
        const moonGroup = new THREE.Group();
        const moonMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0x444400 });
        const moon = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), moonMat);
        const moonShadow = new THREE.Mesh(new THREE.SphereGeometry(1.55, 32, 32), new THREE.MeshBasicMaterial({color: 0x000}));
        moonShadow.position.x = 0.5;
        moonGroup.add(moon); moonGroup.add(moonShadow);
        moonGroup.position.set(-18, 12, -10);
        scene.add(moonGroup);

        // --- LIGHTING ---
        const sun = new THREE.PointLight(0xffffff, 80); sun.position.set(10, 10, 10); scene.add(sun);
        scene.add(new THREE.AmbientLight(0x111111));
        camera.position.z = 22;

        // --- API INTEGRATION ---
        let repairFactor = 0;
        async function updateData() {
            try {
                const res = await fetch('https://terra-classic-lcd.publicnode.com/cosmos/bank/v1beta1/supply/by_denom?denom=uluna');
                const data = await res.json();
                const current = parseFloat(data.amount.amount) / 1000000;
                repairFactor = Math.min((6900000000000 - current) / 100000000000, 1);
                document.getElementById('percent').innerText = Math.floor(repairFactor * 100);

                const res2 = await fetch(`https://terra-classic-lcd.publicnode.com/cosmos/bank/v1beta1/balances/${YOUR_WALLET}`);
                const data2 = await res2.json();
                const lunc = parseFloat(data2.balances.find(b => b.denom === 'uluna')?.amount || 0) / 1000000;
                document.getElementById('moon-status').innerText = lunc.toLocaleString();
                moonShadow.position.x = 0.5 + (Math.min(lunc / 50000000, 1) * 3);
            } catch(e) { console.warn("Sync error"); }
        }
        setInterval(updateData, 30000); updateData();

        // --- INTERACTION ---
        window.findWallet = () => {
            const addr = document.getElementById('walletInput').value;
            let hash = 0; for(let i=0; i<addr.length; i++) hash = addr.charCodeAt(i) + ((hash << 5) - hash);
            const pos = new THREE.Vector3(Math.sin(hash)*20, Math.cos(hash)*20, (hash%15)-5);
            const startCam = camera.position.clone();
            let t = 0;
            const interval = setInterval(() => {
                t += 0.02; camera.position.lerpVectors(startCam, pos.clone().multiplyScalar(1.5), t);
                camera.lookAt(0,0,0); if(t >= 1) clearInterval(interval);
            }, 20);
        };

        window.takeSnapshot = () => {
            renderer.render(scene, camera);
            const link = document.createElement('a');
            link.download = `LUNC-MAP-${Date.now()}.png`;
            link.href = renderer.domElement.toDataURL();
            link.click();
        };

        function animate() {
            requestAnimationFrame(animate);
            shards.forEach(s => s.position.lerpVectors(s.userData.origin, new THREE.Vector3(0,0,0), repairFactor));
            planetGroup.rotation.y += 0.003;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Simple click-to-copy for the mystery address
        document.querySelector('#satellite-log span').addEventListener('click', function() {
            const addr = "terra1jpddm2phs4mtxxjwepxccqzm4f465zchx7um32"; // Put your real wallet here
            navigator.clipboard.writeText(addr);
            this.innerText = "COPIED_TO_BUFFER";
            setTimeout(() => { this.innerText = "terra1...[CLICK_TO_VIEW]"; }, 2000);
        });

        function animate() {
            requestAnimationFrame(animate);
    
            // Rotate the planet group
            if (planetGroup) planetGroup.rotation.y += 0.003;
    
            // Repair logic: move shards closer to center based on repairFactor
            shards.forEach(s => {
            s.position.lerpVectors(s.userData.origin, new THREE.Vector3(0,0,0), repairFactor);
            });

            renderer.render(scene, camera);
       }
       animate(); // This is the "Ignition" button!
      
    </script>
</body>
</html>
