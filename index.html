<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNC // BURN_REALITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; font-family: 'Courier New', monospace; }
        .stat-card { border: 1px solid rgba(59, 130, 246, 0.2); background: rgba(15, 23, 42, 0.5); }
    </style>
</head>
<body class="text-slate-300 p-6">

    <div class="max-w-md mx-auto mb-8 border-b border-slate-800 pb-4">
        <h1 class="text-2xl font-bold text-blue-500 tracking-tighter">LUNC // REALITY_SCAN</h1>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest">System Status: Connected to Terra-Classic</p>
    </div>

    <div class="max-w-md mx-auto space-y-4">
        
        <div class="stat-card p-5 rounded-xl">
            <p class="text-[10px] uppercase text-slate-500 mb-1">Circulating Supply</p>
            <div class="flex items-baseline gap-2">
                <h2 id="supply" class="text-3xl font-bold text-white">5.47</h2>
                <span class="text-blue-500 font-bold">T</span>
            </div>
            <div class="mt-3 w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 15%"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="stat-card p-4 rounded-xl">
                <p class="text-[10px] uppercase text-slate-500 mb-1 italic">Target: $0.01</p>
                <h3 id="days-01" class="text-xl font-bold text-white">---</h3>
                <p class="text-[9px] text-blue-400 uppercase">Days Left</p>
            </div>
            <div class="stat-card p-4 rounded-xl">
                <p class="text-[10px] uppercase text-slate-500 mb-1 italic">Target: $1.00</p>
                <h3 id="years-1" class="text-xl font-bold text-white">---</h3>
                <p class="text-[9px] text-blue-400 uppercase">Years Left</p>
            </div>
        </div>

        <div class="stat-card p-4 rounded-xl border-dashed">
            <h4 class="text-[10px] font-bold text-slate-400 mb-3 border-b border-slate-800 pb-1 uppercase">Burn Parameters</h4>
            <div class="space-y-2 text-xs">
                <div class="flex justify-between">
                    <span>DAILY_BURN_AVG:</span>
                    <span class="text-green-400">540M LUNC</span>
                </div>
                <div class="flex justify-between">
                    <span>MARKET_CAP_EST:</span>
                    <span class="text-white">$242M</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        const wallet = "terra18pddm2phs4mtxxjwpxccqzm4f465zchx7um32";
        
        async function updateReality() {
            try {
                // 1. Fetch real supply from the chain
                const r = await fetch('https://terra-classic-lcd.publicnode.com/cosmos/bank/v1beta1/supply/by_denom?denom=uluna');
                const d = await r.json();
                const totalAmount = parseFloat(d.amount.amount) / 1000000;
                
                // 2. Constants for Math
                const dailyBurn = 540000000; // Est 540M per day based on volume
                const mCap = 242000000; // Current Market Cap
                
                // 3. Math Logic
                // Target Supply = Market Cap / Target Price
                const targetSupply01 = mCap / 0.01;
                const targetSupply1 = mCap / 1.00;
                
                const daysTo01 = Math.max(0, (totalAmount - targetSupply01) / dailyBurn);
                const daysTo1 = Math.max(0, (totalAmount - targetSupply1) / dailyBurn);

                // 4. Update UI
                document.getElementById('supply').innerText = (totalAmount / 1e12).toFixed(3);
                document.getElementById('days-01').innerText = Math.floor(daysTo01).toLocaleString();
                document.getElementById('years-1').innerText = (daysTo1 / 365).toFixed(1);
                
                // Visual Progress
                const progress = (1 - (totalAmount / 6.9e12)) * 100;
                document.getElementById('progress-bar').style.width = progress + "%";

            } catch (e) {
                document.getElementById('tx-log').innerText = "DATA_LINK_ERROR";
            }
        }

        updateReality();
        setInterval(updateReality, 60000); // Update every minute
    </script>
</body>
</html>
