<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUNC Galaxy Modern</title>
<style>
  body { margin: 0; overflow: hidden; background: #000010; }
  canvas { display: block; }
</style>
</head>
<body>

<script type="module">
// Import Three.js from CDN
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js';

// ---------------- Scene Setup ----------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000010);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0,50,150);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// ---------------- Controls ----------------
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// ---------------- Lights ----------------
const ambient = new THREE.AmbientLight(0xffffff,0.3);
scene.add(ambient);
const pointLight = new THREE.PointLight(0xffffff,1.2);
pointLight.position.set(50,50,50);
scene.add(pointLight);

// ---------------- Moon / Treasury ----------------
const moonGeometry = new THREE.SphereGeometry(5,64,64);
const moonMaterial = new THREE.MeshStandardMaterial({
    color: 0x8888ff,
    emissive: 0x0000ff,
    emissiveIntensity: 0.5,
    roughness:0.3,
    metalness:0.2
});
const moon = new THREE.Mesh(moonGeometry,moonMaterial);
moon.position.set(0,20,0);
scene.add(moon);

const treasuryBalance = { value: 0 };
const moonFullThreshold = 1000000000;
const sunThreshold = 2000000000;

// ---------------- Shattered Planet ----------------
const planetGroup = new THREE.Group();
const fragmentCount = 15;
const planetFragments = [];
for(let i=0;i<fragmentCount;i++){
    const geom = new THREE.IcosahedronGeometry(2 + Math.random()*1.5,0);
    const mat = new THREE.MeshStandardMaterial({ color:0x228822, roughness:0.6 });
    const frag = new THREE.Mesh(geom,mat);
    frag.position.set(
        (Math.random()-0.5)*40,
        (Math.random()-0.5)*10,
        (Math.random()-0.5)*40
    );
    planetGroup.add(frag);
    planetFragments.push(frag);
}
scene.add(planetGroup);
let burnProgress = 0;

// ---------------- Stars ----------------
const starCount = 200;
const starGeometry = new THREE.BufferGeometry();
const positions = [];
const colors = [];
for(let i=0;i<starCount;i++){
    positions.push((Math.random()-0.5)*400);
    positions.push((Math.random()-0.5)*200);
    positions.push((Math.random()-0.5)*400);
    colors.push(1,1,0.7); // soft yellow
}
starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
starGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));
const starMaterial = new THREE.PointsMaterial({
    size:0.8,
    vertexColors:true,
    transparent:true,
    opacity:0.9,
    blending:THREE.AdditiveBlending
});
const stars = new THREE.Points(starGeometry,starMaterial);
scene.add(stars);

// ---------------- Transaction Beams ----------------
const beams = [];
function shootBeam(from,to,color=0xffaa00){
    const curve = new THREE.QuadraticBezierCurve3(
        from,
        new THREE.Vector3(
            (from.x+to.x)/2,
            Math.max(from.y,to.y)+10+Math.random()*5,
            (from.z+to.z)/2
        ),
        to
    );
    const points = curve.getPoints(30);
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({ color:color, transparent:true, opacity:0.7 });
    const line = new THREE.Line(geometry,material);
    line.life = 100;
    beams.push(line);
    scene.add(line);
}

// ---------------- Animation ----------------
function animate(){
    requestAnimationFrame(animate);

    controls.update();

    // Demo: treasury increases
    treasuryBalance.value += 7000000;

    const moonRatio = Math.min(treasuryBalance.value / moonFullThreshold,1);
    moon.scale.setScalar(0.5 + 1.5*moonRatio);
    moon.material.emissiveIntensity = 0.5 + 1*moonRatio;
    if(treasuryBalance.value >= sunThreshold){
        moon.material.color.set(0xffdd33);
        moon.material.emissive.set(0xffaa00);
        moon.material.emissiveIntensity = 1.5;
    } else {
        moon.material.color.set(0x8888ff);
        moon.material.emissive.set(0x0000ff);
    }

    // Planet repair
    planetFragments.forEach(frag=>{
        frag.position.lerp(new THREE.Vector3(0,0,0), burnProgress);
    });

    // Animate beams
    for(let i=beams.length-1;i>=0;i--){
        beams[i].life--;
        beams[i].material.opacity -= 0.007;
        if(beams[i].life<=0){
            scene.remove(beams[i]);
            beams.splice(i,1);
        }
    }

    renderer.render(scene,camera);
}
animate();

// ---------------- Demo beams ----------------
setInterval(()=>{
    const idx = Math.floor(Math.random()*starCount);
    const positions = starGeometry.attributes.position.array;
    const from = new THREE.Vector3(positions[idx*3],positions[idx*3+1],positions[idx*3+2]);
    if(Math.random()<0.7){
        shootBeam(from, moon.position.clone());
    } else {
        shootBeam(from, new THREE.Vector3(0,0,0));
        burnProgress = Math.min(burnProgress + 0.015,1);
    }
},400);

window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
